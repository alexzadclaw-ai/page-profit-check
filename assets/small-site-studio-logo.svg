<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" role="img" aria-labelledby="title desc">
  <title id="title">Small Site Studio logo</title>
  <desc id="desc">Three sweeping S-shaped ribbons forming an SSS mark beside the Small Site Studio wordmark.</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="64" x2="86" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f2438"/>
      <stop offset="1" stop-color="#1d3a55"/>
    </linearGradient>
    <linearGradient id="blue" x1="15" y1="66" x2="98" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4778a8"/>
      <stop offset="1" stop-color="#7ca7cf"/>
