      <path d="M58 60 C82 51 92 40 82 30 C74 22 80 13 101 8 C111 6 120 5 130 5 C112 12 99 20 95 30 C89 43 79 53 58 60 Z" fill="url(#mint)"/>
    </g>
    <text x="150" y="31" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="900" letter-spacing="-.8" fill="currentColor">Small Site</text>
    <text x="150" y="53" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="750" letter-spacing="-.45" fill="currentColor" opacity=".72">Studio</text>
  </g>
